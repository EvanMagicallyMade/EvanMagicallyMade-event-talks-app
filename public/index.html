<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Talks Event</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Tech Talks 2026</h1>
        <p>A day of insightful technical discussions</p>
    </header>

    <main>
        <section class="filters">
            <h2>Filter by Category</h2>
            <div id="category-buttons">
                <button class="filter-btn active" data-category="all">All</button>
            </div>
        </section>

        <section class="schedule-section">
            <h2>Event Schedule</h2>
            <div id="schedule-container" class="schedule-grid">
                <!-- Schedule items will be loaded here by JavaScript -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Tech Talks. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
